# Appends the DONATE section (from .github/DONATE.md) to every release body when a release
# is published or edited. Uses the repo name for the memo: "RepoName - Donation".
name: Append DONATE to release

on:
  release:
    types: [published, edited]

jobs:
  append-donate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Substitute repo name in DONATE template
        id: template
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          sed "s/{{REPO_NAME}}/$REPO_NAME/g" .github/DONATE.md > donate_section.txt

      - name: Get release body and append DONATE if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ github.event.release.id }}
          REPO: ${{ github.repository }}
        run: |
          # Get current release body from API (authoritative current state)
          BODY=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/$RELEASE_ID" | jq -r '.body // ""')
          if echo "$BODY" | grep -q "## DONATE"; then
            echo "DONATE section already present, skipping."
            exit 0
          fi
          DONATE=$(cat donate_section.txt)
          NEW_BODY="${BODY}"$'\n\n'"${DONATE}"
          # Build JSON payload with escaped body (jq -Rs reads raw string, outputs JSON string)
          BODY_JSON=$(echo -n "$NEW_BODY" | jq -Rs .)
          curl -s -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/releases/$RELEASE_ID" \
            -d "{\"body\": $BODY_JSON}"
